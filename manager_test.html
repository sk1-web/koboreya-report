<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>こぼれや 店長力テスト</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Sans','Meiryo',sans-serif;background:#fdf6f0;color:#333;min-height:100vh}
#app{min-height:100vh;display:flex;flex-direction:column}

/* ===== TOPBAR ===== */
.topbar{background:#8b1a1a;color:#fff;padding:12px 20px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 6px rgba(0,0,0,0.2)}
.topbar-logo{font-size:18px;font-weight:bold;letter-spacing:1px}
.topbar-sub{font-size:12px;opacity:0.8;margin-top:2px}
.topbar-user{margin-left:auto;font-size:13px;opacity:0.9}
.topbar-logout{margin-left:12px;background:rgba(255,255,255,0.2);border:none;color:#fff;padding:5px 12px;border-radius:4px;cursor:pointer;font-size:12px}
.topbar-logout:hover{background:rgba(255,255,255,0.3)}

/* ===== SCREENS ===== */
.screen{flex:1;padding:30px 20px;max-width:700px;width:100%;margin:0 auto}

/* ===== LOGIN ===== */
.login-card{background:#fff;border-radius:16px;padding:40px 36px;box-shadow:0 4px 20px rgba(0,0,0,0.08);max-width:420px;margin:60px auto}
.login-title{text-align:center;margin-bottom:8px}
.login-title h1{font-size:22px;color:#8b1a1a;font-weight:bold}
.login-title p{font-size:13px;color:#888;margin-top:6px}
.login-badge{display:inline-block;background:#8b1a1a;color:#fff;font-size:11px;padding:3px 10px;border-radius:20px;margin-bottom:20px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;color:#555;margin-bottom:6px;font-weight:500}
.form-group input{width:100%;padding:10px 14px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;transition:border-color 0.2s}
.form-group input:focus{outline:none;border-color:#8b1a1a}
.btn-primary{width:100%;background:#8b1a1a;color:#fff;border:none;padding:13px;border-radius:8px;font-size:15px;font-weight:bold;cursor:pointer;margin-top:8px;transition:background 0.2s}
.btn-primary:hover{background:#a52020}
.btn-secondary{background:#fff;color:#8b1a1a;border:1.5px solid #8b1a1a;padding:10px 20px;border-radius:8px;font-size:14px;cursor:pointer;transition:all 0.2s}
.btn-secondary:hover{background:#fdf0f0}
.login-err{color:#c0392b;font-size:13px;margin-top:10px;text-align:center;min-height:18px}

/* ===== INTRO ===== */
.intro-hero{background:linear-gradient(135deg,#8b1a1a,#c0392b);color:#fff;border-radius:16px;padding:36px 30px;margin-bottom:24px;text-align:center}
.intro-hero h1{font-size:26px;font-weight:bold;margin-bottom:8px}
.intro-hero p{font-size:14px;opacity:0.9;line-height:1.7}
.intro-cats{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
.cat-card{background:#fff;border-radius:12px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,0.06);border-left:4px solid var(--c)}
.cat-card h3{font-size:14px;font-weight:bold;margin-bottom:4px;color:var(--c)}
.cat-card p{font-size:12px;color:#777}
.intro-info{background:#fff3cd;border-radius:10px;padding:16px 18px;margin-bottom:24px;font-size:13px;line-height:1.8;color:#555}
.intro-info b{color:#8b1a1a}
.intro-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn-lg{background:#8b1a1a;color:#fff;border:none;padding:14px 32px;border-radius:10px;font-size:16px;font-weight:bold;cursor:pointer;transition:background 0.2s}
.btn-lg:hover{background:#a52020}
.btn-hist{background:#fff;color:#8b1a1a;border:2px solid #8b1a1a;padding:13px 24px;border-radius:10px;font-size:14px;font-weight:bold;cursor:pointer;transition:all 0.2s}
.btn-hist:hover{background:#fdf0f0}

/* ===== TEST ===== */
.progress-bar-wrap{background:#e8d5c4;border-radius:20px;height:8px;margin-bottom:24px;overflow:hidden}
.progress-bar{background:linear-gradient(90deg,#8b1a1a,#e74c3c);height:100%;border-radius:20px;transition:width 0.4s ease}
.q-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.q-num{font-size:13px;color:#8b1a1a;font-weight:bold}
.q-cat{font-size:12px;color:#fff;background:var(--cc);padding:3px 10px;border-radius:20px}
.q-text{background:#fff;border-radius:14px;padding:24px;margin-bottom:20px;font-size:16px;line-height:1.8;font-weight:500;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.choices{display:flex;flex-direction:column;gap:10px}
.choice-btn{background:#fff;border:2px solid #e0cfc4;border-radius:12px;padding:14px 18px;text-align:left;cursor:pointer;font-size:14px;line-height:1.6;transition:all 0.2s;display:flex;align-items:flex-start;gap:10px}
.choice-btn:hover{border-color:#8b1a1a;background:#fdf0f0}
.choice-btn.selected{border-color:#8b1a1a;background:#fdf0f0}
.choice-label{min-width:24px;height:24px;border-radius:50%;background:#e8d5c4;color:#8b1a1a;font-weight:bold;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.choice-btn.selected .choice-label{background:#8b1a1a;color:#fff}
.q-nav{display:flex;justify-content:space-between;margin-top:20px;gap:12px}
.btn-back{background:#f5ede6;color:#8b1a1a;border:none;padding:11px 20px;border-radius:8px;cursor:pointer;font-size:14px}
.btn-next{background:#8b1a1a;color:#fff;border:none;padding:11px 24px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:bold;margin-left:auto}
.btn-next:disabled{background:#ccc;cursor:default}

/* ===== RESULTS ===== */
.results-hero{background:linear-gradient(135deg,#8b1a1a,#c0392b);color:#fff;border-radius:16px;padding:30px;margin-bottom:20px;text-align:center}
.results-hero h2{font-size:18px;margin-bottom:6px;opacity:0.9}
.score-big{font-size:56px;font-weight:900;line-height:1}
.score-sub{font-size:16px;opacity:0.85;margin-top:4px}
.grade-badge{display:inline-block;background:rgba(255,255,255,0.25);padding:6px 18px;border-radius:20px;font-size:14px;font-weight:bold;margin-top:10px}
.rank-row{display:flex;gap:20px;justify-content:center;margin-top:14px}
.rank-item{text-align:center}
.rank-item .val{font-size:20px;font-weight:bold}
.rank-item .lbl{font-size:12px;opacity:0.8}
.results-section{background:#fff;border-radius:14px;padding:24px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.section-title{font-size:16px;font-weight:bold;color:#8b1a1a;margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid #f5ede6}
#radar-canvas{display:block;margin:0 auto}
.cat-bars{margin-top:12px}
.cat-bar-row{margin-bottom:14px}
.cat-bar-label{display:flex;justify-content:space-between;margin-bottom:5px;font-size:13px}
.cat-bar-name{font-weight:600;color:#555}
.cat-bar-pct{font-weight:bold}
.cat-bar-bg{background:#f0e8e0;border-radius:20px;height:12px;overflow:hidden}
.cat-bar-fill{height:100%;border-radius:20px;transition:width 1s ease}
.sw-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.sw-box{border-radius:12px;padding:16px}
.sw-box.strength{background:#e8f8f0;border:1px solid #2ecc71}
.sw-box.improve{background:#fef9e7;border:1px solid #f39c12}
.sw-box h4{font-size:13px;font-weight:bold;margin-bottom:8px}
.sw-box h4.s{color:#27ae60}
.sw-box h4.i{color:#e67e22}
.sw-box ul{list-style:none;font-size:13px;color:#555}
.sw-box ul li{padding:3px 0;padding-left:14px;position:relative}
.sw-box ul li::before{content:'▸';position:absolute;left:0;color:#888}
.prev-row{display:flex;gap:10px;flex-wrap:wrap}
.prev-item{background:#f5ede6;border-radius:8px;padding:10px 14px;font-size:12px;flex:1;min-width:120px}
.prev-item .diff-up{color:#27ae60;font-weight:bold}
.prev-item .diff-dn{color:#e74c3c;font-weight:bold}
.prev-item .diff-eq{color:#888;font-weight:bold}
.plan-list{list-style:none}
.plan-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid #f5ede6;font-size:13px}
.plan-item:last-child{border-bottom:none}
.plan-tag{min-width:48px;height:22px;border-radius:4px;font-size:11px;font-weight:bold;display:flex;align-items:center;justify-content:center;color:#fff}
.plan-tag.must{background:#c0392b}
.plan-tag.imp{background:#e67e22}
.plan-tag.keep{background:#27ae60}
.btn-done{background:#8b1a1a;color:#fff;border:none;padding:13px 30px;border-radius:10px;font-size:15px;font-weight:bold;cursor:pointer;display:block;width:100%;margin-top:8px}
.btn-done:hover{background:#a52020}

/* ===== HISTORY ===== */
.hist-none{text-align:center;padding:50px 20px;color:#aaa;font-size:14px}
.hist-card{background:#fff;border-radius:12px;padding:18px 20px;margin-bottom:12px;box-shadow:0 2px 6px rgba(0,0,0,0.05);cursor:pointer;transition:box-shadow 0.2s;border:1.5px solid transparent}
.hist-card:hover{box-shadow:0 4px 12px rgba(139,26,26,0.15);border-color:#dbb9b9}
.hist-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.hist-card-date{font-size:13px;color:#888}
.hist-card-score{font-size:24px;font-weight:900;color:#8b1a1a}
.hist-card-grade{font-size:12px;background:#f5ede6;color:#8b1a1a;padding:2px 10px;border-radius:20px;font-weight:bold}
.hist-mini-bars{display:flex;gap:6px;flex-wrap:wrap}
.hmb{flex:1;min-width:80px}
.hmb-name{font-size:10px;color:#888;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hmb-bg{background:#f0e8e0;border-radius:10px;height:6px;overflow:hidden}
.hmb-fill{height:100%;border-radius:10px}
.hist-user-filter{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.filter-btn{background:#fff;border:1.5px solid #ddd;color:#555;padding:6px 14px;border-radius:20px;font-size:12px;cursor:pointer;transition:all 0.2s}
.filter-btn.active{background:#8b1a1a;border-color:#8b1a1a;color:#fff}
.hist-detail-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.hist-detail-card{background:#fdf6f0;border-radius:16px;max-width:600px;width:100%;max-height:90vh;overflow-y:auto;padding:24px}
.close-btn{float:right;background:none;border:none;font-size:22px;cursor:pointer;color:#888;line-height:1}
@media(max-width:500px){
  .intro-cats{grid-template-columns:1fr}
  .sw-grid{grid-template-columns:1fr}
  .intro-btns{flex-direction:column}
  .btn-lg,.btn-hist{width:100%}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
/* ============================================================
   DATA
============================================================ */
const CATS = [
  {id:'people', name:'ピープルマネジメント力', short:'ピープル', desc:'個人への関わり・育成力', color:'#e74c3c'},
  {id:'org',    name:'組織活性力',             short:'組織活性', desc:'チームビルディング・環境整備', color:'#e67e22'},
  {id:'floor',  name:'現場基礎力',             short:'現場基礎', desc:'飲食店運営・現場対応力', color:'#2ecc71'},
  {id:'biz',    name:'ビジネス思考力',         short:'ビジネス', desc:'数値管理・経営視点', color:'#3498db'},
  {id:'self',   name:'セルフマネジメント力',   short:'セルフ',   desc:'自己管理・成長意欲', color:'#9b59b6'}
];

const QUESTIONS = [
  /* ── ピープルマネジメント力 (Q1-10) ── */
  {cat:'people', q:'新しいアルバイトスタッフが配置されました。最初の1週間でどのように接しますか？', c:[{t:'業務マニュアルを渡して自分で学んでもらう',s:0},{t:'他のスタッフに指導を任せて様子を見る',s:1},{t:'基本業務を一緒にやりながら積極的に声かけをする',s:3},{t:'1日だけ同行して後は自立を促す',s:2}]},
  {cat:'people', q:'スタッフが同じミスを繰り返しています。どのように対処しますか？', c:[{t:'全体ミーティングで注意する',s:0},{t:'個別に呼んで原因と改善策を一緒に考える',s:3},{t:'その都度口頭で注意する',s:1},{t:'先輩スタッフに指導を任せる',s:2}]},
  {cat:'people', q:'ベテランスタッフが新人指導に消極的です。どう対応しますか？', c:[{t:'業務命令として指導を強制する',s:0},{t:'なぜ消極的なのか原因を聞き、協力できる環境を整える',s:3},{t:'新人を別の担当者に替える',s:1},{t:'店長自身が全て指導する',s:2}]},
  {cat:'people', q:'スタッフが不満を持って退職を申し出てきました。どう対応しますか？', c:[{t:'感情的にならず不満の内容を丁寧に聞く',s:3},{t:'引き止めはせずすぐに後任を探す',s:1},{t:'上司に全て相談して判断を仰ぐ',s:2},{t:'「みんな同じ条件だ」と諭す',s:0}]},
  {cat:'people', q:'スタッフが業務中にスマートフォンを操作していました。どう対応しますか？', c:[{t:'後で個別に声をかけ、理由を聞いた上でルールを確認する',s:3},{t:'その場で厳しく叱責する',s:1},{t:'見て見ぬふりをする',s:0},{t:'全体へルール周知の連絡を入れる',s:2}]},
  {cat:'people', q:'繁忙期でスタッフが疲弊している様子が見られます。どうしますか？', c:[{t:'「もう少し頑張れ」と激励する',s:0},{t:'疲れていても業務優先で指示を出す',s:1},{t:'スタッフが自主的に相談するのを待つ',s:2},{t:'個別に状況を確認しシフト調整や声かけで負担を軽減する',s:3}]},
  {cat:'people', q:'高い目標を掲げているスタッフに対し、どのように関わりますか？', c:[{t:'目標が高すぎると現実的なアドバイスをする',s:1},{t:'意欲を褒めるだけにとどめる',s:2},{t:'目標達成に向けた具体的な行動計画を一緒に作る',s:3},{t:'他のスタッフと同じように扱う',s:0}]},
  {cat:'people', q:'2名のスタッフ間でトラブルが起きました。どう対応しますか？', c:[{t:'双方から別々に話を聞き事実確認してから対応を考える',s:3},{t:'どちらか一方の話だけを聞いて判断する',s:0},{t:'当事者同士で解決させる',s:1},{t:'すぐに上司に報告する',s:2}]},
  {cat:'people', q:'スタッフの良い行動（接客・業務改善など）を見かけました。どうしますか？', c:[{t:'次回の面談で伝える',s:1},{t:'特に何もしない',s:0},{t:'その場で具体的に褒め、他のスタッフにも共有する',s:3},{t:'シフト表や掲示板に掲載する',s:2}]},
  {cat:'people', q:'スタッフとの定期面談をどのように実施していますか？', c:[{t:'困ったことが起きた時だけ実施する',s:1},{t:'スケジュールに組み込み成長・目標・課題を定期的に話し合う',s:3},{t:'業務が忙しくてできていない',s:0},{t:'メモを渡して自己評価をさせる',s:2}]},

  /* ── 組織活性力 (Q11-20) ── */
  {cat:'org', q:'チームの士気が下がっています。どのような対策を取りますか？', c:[{t:'問題のある個人を特定して指導する',s:1},{t:'楽しいイベントを企画して気分転換を図る',s:2},{t:'チームの課題を一緒に話し合い改善策を全員で考える',s:3},{t:'業績が回復するまで様子を見る',s:0}]},
  {cat:'org', q:'スタッフ同士のコミュニケーションを活性化するために何をしますか？', c:[{t:'業務外のことには関与しない',s:0},{t:'自分から積極的に声かけしスタッフ間の橋渡し役になる',s:3},{t:'SNSグループを作って交流を促す',s:2},{t:'毎週全体ミーティングを開催する',s:1}]},
  {cat:'org', q:'ミーティングで意見が出ない時、どう対処しますか？', c:[{t:'発言しやすい雰囲気を作り特定のスタッフに意見を求める',s:3},{t:'次回に持ち越す',s:0},{t:'店長が全て決めて伝える',s:1},{t:'事前にアンケートを取って内容を準備する',s:2}]},
  {cat:'org', q:'目標売上を達成した際、チームにどのようにフィードバックしますか？', c:[{t:'全員の前で具体的に称え次の目標へのモチベーションにつなげる',s:3},{t:'口頭で「お疲れ様」と伝える',s:1},{t:'特に何もしない',s:0},{t:'評価に反映させることを約束する',s:2}]},
  {cat:'org', q:'新しいルールや取り組みをチームに導入する際、どうしますか？', c:[{t:'重要事項だけ伝えてあとは各自に任せる',s:1},{t:'掲示板に貼り出すだけにする',s:0},{t:'まずベテランスタッフに伝えて広めてもらう',s:2},{t:'「なぜそのルールが必要か」背景を説明した上で全員に伝える',s:3}]},
  {cat:'org', q:'スタッフ間の仕事量に不公平感が生まれています。どう対処しますか？', c:[{t:'公平かどうかは個人の感じ方と伝える',s:0},{t:'全員の業務量を機械的に均等にする',s:2},{t:'文句を言っているスタッフだけ個別に対応する',s:1},{t:'仕事の割り振りを見直しスタッフと話し合って調整する',s:3}]},
  {cat:'org', q:'チームに新しいスタッフが加わりました。どのように迎え入れますか？', c:[{t:'自分が直接紹介し全員が名前と役割を知れる環境を整える',s:3},{t:'他のスタッフに紹介して任せる',s:1},{t:'業務が落ち着いてから改めて紹介する',s:0},{t:'先輩スタッフ1名を担当制にする',s:2}]},
  {cat:'org', q:'チームの雰囲気が暗いと感じた時、どうしますか？', c:[{t:'業務に支障がなければ特に何もしない',s:0},{t:'原因を探りながらまず自分が明るく接することを意識する',s:3},{t:'元気の出るBGMをかける',s:1},{t:'スタッフに「もっと元気よくしよう」と声をかける',s:2}]},
  {cat:'org', q:'閑散期に売上が落ち込みスタッフのモチベーションが低下しました。どう対応しますか？', c:[{t:'「仕方ない」と割り切ってもらう',s:0},{t:'インセンティブ制度の導入を上に要望する',s:2},{t:'閑散期を活用したスキルアップや店舗改善に取り組み意味を持たせる',s:3},{t:'客数を増やす施策をスタッフに考えさせる',s:1}]},
  {cat:'org', q:'チーム全体の接客品質にバラつきがあります。どう解決しますか？', c:[{t:'標準的な接客手順を明文化し全員で確認・共有する',s:3},{t:'接客品質が高いスタッフに他を教えてもらう',s:2},{t:'個別に苦手な人だけ指導する',s:1},{t:'お客様アンケートをとって課題を把握してから考える',s:0}]},

  /* ── 現場基礎力 (Q21-30) ── */
  {cat:'floor', q:'開店前のチェックリストで不備が見つかりました。どう対応しますか？', c:[{t:'忙しい時は後回しにする',s:0},{t:'担当スタッフに任せる',s:2},{t:'開店後の空き時間に対応する',s:1},{t:'開店前に必ず修正・補充しスタッフに報告する',s:3}]},

// Shuffle array function for random question selection
function shuffleArray(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

const LABELS = ['A','B','C','D'];
const MAX_PER_Q = 3;
const Q_PER_CAT = 10;
const MAX_PER_CAT = Q_PER_CAT * MAX_PER_Q; // 30
const MAX_TOTAL = 50 * MAX_PER_Q; // 150 (50 selected questions × 3 pts each)

function gradeFromPct(p){
  if(p>=90)return{label:'S',text:'卓越レベル',color:'#8e44ad'};
  if(p>=80)return{label:'A',text:'優秀レベル',color:'#27ae60'};
  if(p>=70)return{label:'B',text:'良好レベル（店長候補として適性あり）',color:'#2980b9'};
  if(p>=60)return{label:'C',text:'標準レベル（さらなる成長が必要）',color:'#e67e22'};
  return{label:'D',text:'要強化レベル',color:'#c0392b'};
}

  // Select 10 questions per category randomly (10 cats × 5 = 50 total), then shuffle order
  var selectedQuestions = (function() {
    var bycat = {};
    QUESTIONS.forEach(function(q) {
      if (!bycat[q.cat]) bycat[q.cat] = [];
      bycat[q.cat].push(q);
    });
    var result = [];
    Object.keys(bycat).forEach(function(cat) {
      result = result.concat(shuffleArray(bycat[cat]).slice(0, 10));
    });
    return shuffleArray(result);
  })();
  let state = {

function calcPoints(grade){
  var map = {S:5, A:4, B:3, C:2, D:1};
  return map[grade.label] || 1;
}
function addPointsToAccount(userId, pts, reason){
  try{
    var accounts = getAccounts();
    var idx = accounts.findIndex(function(a){return a.id===userId;});
    if(idx < 0) return;
    accounts[idx].points = parseFloat(((accounts[idx].points || 0) + pts).toFixed(1));
    if(!accounts[idx].activityLog) accounts[idx].activityLog = [];
    accounts[idx].activityLog.push({
      ts: new Date().toISOString(),
      delta: pts,
      reason: reason || '店長力テスト'
    });
    if(accounts[idx].activityLog.length > 500)
      accounts[idx].activityLog = accounts[idx].activityLog.slice(-500);
    localStorage.setItem('koboreya_accounts', JSON.stringify(accounts));
  }catch(e){}
}
function uuid(){
  return Date.now().toString(36)+Math.random().toString(36).substr(2,6);
}

/* ============================================================
   COMPUTE RESULTS
============================================================ */
function computeResults(answers, user){
  var catScores = {};
  CATS.forEach(function(cat){catScores[cat.id]={raw:0,max:MAX_PER_CAT};});
  selectedQuestions.forEach(function(q,i){
    var ai = answers[i];
    if(ai !== null){
      var s = q.c[ai].s;
      catScores[q.cat].raw += s;
    }
  });
  var totalRaw = 0;
  CATS.forEach(function(cat){
    var cs = catScores[cat.id];
    cs.pct = Math.round(cs.raw / cs.max * 100);
    totalRaw += cs.raw;
  });
  var totalPct = Math.round(totalRaw / MAX_TOTAL * 100);
  var grade = gradeFromPct(totalPct);
  // sorted categories
  var sorted = CATS.slice().sort(function(a,b){return catScores[b.id].pct - catScores[a.id].pct;});
  var strengths = sorted.slice(0,2);
  var improves = sorted.slice(-2).reverse();
  return {
    id: uuid(),
    userId: user.id,
    userName: user.name,
    date: new Date().toISOString(),
    answers: answers.slice(),
    catScores: catScores,
    totalRaw: totalRaw,
    totalMax: MAX_TOTAL,
    totalPct: totalPct,
    grade: grade,
    strengths: strengths,
    improves: improves
  };
}

      '<div class="cat-bar-label"><span class="cat-bar-name">'+cat.name+'</span>' +

      '</div>';
  }).join('');

  var strengths = r.strengths.map(function(cat){
    var cs = r.catScores[cat.id];
    return '<li>'+cat.name+'（'+cs.pct+'%）</li>';
  }).join('');
  var improves = r.improves.map(function(cat){
    var cs = r.catScores[cat.id];
    return '<li>'+cat.name+'（'+cs.pct+'%）</li>';
  }).join('');

  // prev comparison
  var prevHtml = '';
  var allTests = getTests().filter(function(t){return t.userId===state.user.id;});
  var prevTest = allTests.length >= 2 ? allTests[allTests.length-2] : null;
  if(prevTest){

      var cur = r.catScores[cat.id].pct;
      var prv = prevTest.catScores[cat.id].pct;
      var diff = cur - prv;
      var cls = diff>0?'diff-up':diff<0?'diff-dn':'diff-eq';
      var sym = diff>0?'▲':diff<0?'▼':'−';
      return '<div class="prev-item"><div style="font-size:11px;color:#888;margin-bottom:3px">'+cat.short+'</div>' +
        '<div style="font-size:15px;font-weight:bold">'+cur+'%</div>' +

  // learning plan based on weakest cats

      var miniB = CATS.map(function(cat){
        var cs = t.catScores[cat.id];
        return '<div class="hmb"><div class="hmb-name">'+cat.short+'</div>' +
          '<div class="hmb-bg"><div class="hmb-fill" style="width:'+cs.pct+'%;background:'+cat.color+'"></div></div>' +
          '</div>';
      }).join('');
      return '<div class="hist-card" onclick="openHistDetail(\''+t.id+'\')">' +
        '<div class="hist-card-top">' +
        '<div><div class="hist-card-date">'+fmtDate(t.date)+(isAdmin?'　'+esc(t.userName):'')+'</div>' +
        '<span class="hist-card-grade">'+grade.label+'ランク</span></div>' +
        '<div class="hist-card-score">'+t.totalPct+'%</div></div>' +
        '<div class="hist-mini-bars">'+miniB+'</div>' +
        '</div>';
    }).join('');

  var detailHtml = '';
  if(state.histDetail){
    var hd = state.histDetail;
    var hdGrade = gradeFromPct(hd.totalPct);
    // strengths/improves
    var hdStrengths = hd.strengths || CATS.slice().sort(function(a,b){return hd.catScores[b.id].pct-hd.catScores[a.id].pct;}).slice(0,2);
    var hdImproves = hd.improves || CATS.slice().sort(function(a,b){return hd.catScores[a.id].pct-hd.catScores[b.id].pct;}).slice(0,2);
    var hdStrHtml = hdStrengths.map(function(cat){return '<li>'+cat.name+'（'+hd.catScores[cat.id].pct+'%）</li>';}).join('');
    var hdImpHtml = hdImproves.map(function(cat){return '<li>'+cat.name+'（'+hd.catScores[cat.id].pct+'%）</li>';}).join('');
    // learning tips
    var tips = {
      people:'1on1面談の定期化とフィードバック技術の向上',
      org:'チームミーティングの質を高め、心理的安全性のある職場づくり',
      floor:'現場ルールの標準化とチェックリストの実践的な運用',
      biz:'売上・原価・人件費の3つの数値を毎日意識的に確認する習慣',
      self:'1日5分の業務振り返り習慣と、月1冊のマネジメント書籍読書'
    };
    var hdSorted = CATS.slice().sort(function(a,b){return hd.catScores[a.id].pct-hd.catScores[b.id].pct;});
    var hdPlanHtml = [
      {tag:'最重要',cls:'must',cat:hdSorted[0]},
      {tag:'重要',cls:'imp',cat:hdSorted[1]},
      {tag:'継続',cls:'keep',cat:hdSorted[4]}
    ].map(function(p){
      return '<li class="plan-item"><span class="plan-tag '+p.cls+'">'+p.tag+'</span>' +
        '<span style="font-size:12px">【'+p.cat.name+'】'+tips[p.cat.id]+'</span></li>';
    }).join('');
    var hdPointsBadge = hd.earnedPoints ? '<span style="background:#f5ede6;color:#8b1a1a;border-radius:20px;padding:3px 12px;font-size:12px;font-weight:bold;margin-left:8px">+'+hd.earnedPoints+'pt</span>' : '';

    detailHtml = '<div class="hist-detail-overlay" onclick="closeHistDetail(event)">' +
      '<div class="hist-detail-card" onclick="event.stopPropagation()">' +
      '<button class="close-btn" onclick="closeHistDetail()">✕</button>' +
      '<h3 style="font-size:16px;color:#8b1a1a;margin-bottom:4px">'+fmtDate(hd.date)+hdPointsBadge+'</h3>' +
      '<p style="font-size:13px;color:#888;margin-bottom:4px">'+esc(hd.userName)+'</p>' +
      '<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">' +
      '<span style="font-size:28px;font-weight:900;color:#8b1a1a">'+hd.totalPct+'%</span>' +
      '<span style="background:'+hdGrade.color+';color:#fff;border-radius:20px;padding:4px 14px;font-size:13px;font-weight:bold">'+hdGrade.label+'ランク</span>' +
      '<span style="font-size:12px;color:#888">'+hd.totalRaw+' / '+hd.totalMax+'点</span>' +
      '</div>' +
      '<canvas id="radar-detail-canvas" width="260" height="260" style="display:block;margin:0 auto 16px"></canvas>' +
      '<div style="font-size:13px;font-weight:bold;color:#8b1a1a;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid #f5ede6">📊 カテゴリ別スコア</div>' +
      renderResultsCatBars(hd) +
      '<div style="margin-top:16px;font-size:13px;font-weight:bold;color:#8b1a1a;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid #f5ede6">💡 強み・改善ポイント</div>' +
      '<div class="sw-grid">' +
      '<div class="sw-box strength"><h4 class="s" style="font-size:12px">✅ 強み</h4><ul>'+hdStrHtml+'</ul></div>' +
      '<div class="sw-box improve"><h4 class="i" style="font-size:12px">⚠️ 改善</h4><ul>'+hdImpHtml+'</ul></div>' +
      '</div>' +
      '<div style="margin-top:16px;font-size:13px;font-weight:bold;color:#8b1a1a;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid #f5ede6">📘 学習プラン</div>' +
      '<ul class="plan-list">'+hdPlanHtml+'</ul>' +
      '</div></div>';
  }

  return '<h2 style="font-size:18px;color:#8b1a1a;margin-bottom:16px">📋 受験履歴</h2>' +
    filterHtml + cards + detailHtml +
    '<br><button class="btn-secondary" onclick="goIntro()">◀ トップに戻る</button><br><br>';
}

function renderResultsCatBars(r){
  var bars = CATS.map(function(cat){
    var cs = r.catScores[cat.id];
    return '<div class="cat-bar-row" style="margin-bottom:10px">' +
      '<div class="cat-bar-label"><span class="cat-bar-name" style="font-size:12px">'+cat.name+'</span>' +
      '<span class="cat-bar-pct" style="color:'+cat.color+';font-size:12px">'+cs.pct+'%</span></div>' +
      '<div class="cat-bar-bg"><div class="cat-bar-fill" style="width:'+cs.pct+'%;background:'+cat.color+'"></div></div>' +
      '</div>';
  }).join('');
  return '<div style="margin-top:16px">'+bars+'</div>';
}

/* ============================================================
   RADAR CHART
============================================================ */
function drawRadar(canvasId, catScores){
  var canvas = document.getElementById(canvasId);
  if(!canvas) return;
  var ctx = canvas.getContext('2d');
  var w = canvas.width, h = canvas.height;
  var cx = w/2, cy = h/2;
  var r = Math.min(cx, cy) - 45;
  var n = CATS.length;
  var angles = CATS.map(function(_,i){ return -Math.PI/2 + (2*Math.PI/n)*i; });

  ctx.clearRect(0,0,w,h);

  // grid
  [0.25,0.5,0.75,1].forEach(function(frac){
    ctx.beginPath();
    angles.forEach(function(a,i){
      var x = cx + r*frac*Math.cos(a);
      var y = cy + r*frac*Math.sin(a);
      if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    });
    ctx.closePath();
    ctx.strokeStyle = 'rgba(139,26,26,0.1)';
    ctx.lineWidth = 1;
    ctx.stroke();
  });

  // axes
  angles.forEach(function(a){
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx+r*Math.cos(a), cy+r*Math.sin(a));
    ctx.strokeStyle = 'rgba(139,26,26,0.15)';
    ctx.lineWidth = 1;
    ctx.stroke();
  });

  // data
  ctx.beginPath();
  CATS.forEach(function(cat,i){
    var frac = catScores[cat.id].pct / 100;
    var x = cx + r*frac*Math.cos(angles[i]);
    var y = cy + r*frac*Math.sin(angles[i]);
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  });
  ctx.closePath();
  ctx.fillStyle = 'rgba(139,26,26,0.15)';
  ctx.fill();
  ctx.strokeStyle = '#8b1a1a';
  ctx.lineWidth = 2;
  ctx.stroke();

  // dots
  CATS.forEach(function(cat,i){
    var frac = catScores[cat.id].pct / 100;
    var x = cx + r*frac*Math.cos(angles[i]);
    var y = cy + r*frac*Math.sin(angles[i]);
    ctx.beginPath();
    ctx.arc(x,y,5,0,Math.PI*2);
    ctx.fillStyle = cat.color;
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.stroke();
  });

  // labels
  ctx.font = 'bold 11px sans-serif';
  CATS.forEach(function(cat,i){
    var lx = cx + (r+22)*Math.cos(angles[i]);
    var ly = cy + (r+22)*Math.sin(angles[i]);
    ctx.fillStyle = cat.color;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(cat.short, lx, ly);
    // pct
    var pct = catScores[cat.id].pct;
    ctx.font = '10px sans-serif';
    ctx.fillStyle = '#555';
    ctx.fillText(pct+'%', lx, ly+13);
    ctx.font = 'bold 11px sans-serif';
  });
}

/* ============================================================
   ACTIONS
============================================================ */
function attachEvents(){
  var lp = document.getElementById('lp');
  if(lp){
    lp.addEventListener('keydown', function(e){
      if(e.key==='Enter') doLogin();
    });
  }
}

async function sha256(msg){
  var buf = new TextEncoder().encode(msg);
  var hash = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(hash)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
}

function doLogin(){
  var id = (document.getElementById('ln')||{}).value||'';
  var pw = (document.getElementById('lp')||{}).value||'';
  if(!id){ document.getElementById('lerr').textContent='名前を選択してください。'; return; }
  if(!pw){ document.getElementById('lerr').textContent='パスワードを入力してください。'; return; }
  var accounts = getAccounts();
  var acct = accounts.find(function(a){return a.id===id;});
  if(!acct){ document.getElementById('lerr').textContent='アカウントが見つかりません。'; return; }
  sha256(pw).then(function(hash){
    if(acct.pwHash !== hash){
      document.getElementById('lerr').textContent='パスワードが違います。';
      return;
    }
    state.user = acct;
    state.screen = 'intro';
    render();
  });
}

function doLogout(){
  state.user = null;
  state.screen = 'login';
  state.answers = Array(selectedQuestions.length).fill(null);
  state.currentQ = 0;
  state.results = null;
  render();
}

function startTest(){
  // Re-shuffle questions for this attempt (10 per category from 100 total)
  selectedQuestions = (function() {
    var bycat = {};
    QUESTIONS.forEach(function(q) {
      if (!bycat[q.cat]) bycat[q.cat] = [];
      bycat[q.cat].push(q);
    });
    var result = [];
    Object.keys(bycat).forEach(function(cat) {
      result = result.concat(shuffleArray(bycat[cat]).slice(0, 10));
    });
    return shuffleArray(result);
  })();
  state.answers = Array(selectedQuestions.length).fill(null);
  state.currentQ = 0;
  state.screen = 'test';
  render();
}

function goIntro(){
  state.screen = 'intro';
  state.histDetail = null;
  render();
}

function goHistory(){
  state.screen = 'history';
  state.histDetail = null;
  render();
}

function selectAnswer(ci){
  state.answers[state.currentQ] = ci;
  var btn = document.getElementById('btn-next');
  if(btn) btn.disabled = false;
  // re-render choices only
  render();
}

function nextQ(){
  if(state.answers[state.currentQ] === null) return;
  if(state.currentQ === selectedQuestions.length - 1){
    // finish
    var r = computeResults(state.answers, state.user);
    var earnedPts = 3; // 店長力テスト完了固定3pt
    r.earnedPoints = earnedPts;
    saveTest(r);
    addPointsToAccount(state.user.id, earnedPts, '店長力テスト完了 (グレード:'+r.grade.label+')');
    state.results = r;
    state.screen = 'results';
    render();
    window.scrollTo(0,0);
  } else {
    state.currentQ++;
    render();
    window.scrollTo(0,0);
  }
}

function prevQ(){
  if(state.currentQ > 0){
    state.currentQ--;
    render();
    window.scrollTo(0,0);
  }
}

function setHistFilter(uid){
  state.histFilter = uid;
  render();
}

function openHistDetail(id){
  var tests = getTests();
  var t = tests.find(function(x){return x.id===id;});
  if(t){
    state.histDetail = t;
    render();
    setTimeout(function(){drawRadar('radar-detail-canvas', t.catScores);}, 100);
  }
}

function closeHistDetail(e){
  state.histDetail = null;
  render();
}

/* ============================================================
   UTILS
============================================================ */
function esc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDate(iso){
  var d = new Date(iso);
  return d.getFullYear()+'/'+(d.getMonth()+1)+'/'+(d.getDate());
}

/* ============================================================
   INIT
============================================================ */
render();
</script>
